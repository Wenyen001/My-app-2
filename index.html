<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 魔術橡皮擦 Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* 簡單的過場動畫 */
        .fade-slide-in {
            animation: fadeSlideIn 0.3s ease-out forwards;
        }
        @keyframes fadeSlideIn {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        /* 隱藏捲軸但保持可滾動 */
        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .no-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
    </style>
</head>
<body class="min-h-screen bg-white text-slate-900 font-sans flex flex-col overflow-x-hidden">

    <input type="file" id="fileInput" class="hidden" accept="image/*" />

    <header class="border-b border-slate-100 bg-white px-6 py-4 flex justify-between items-center shadow-sm z-10 relative">
        <div class="flex items-center gap-2 text-indigo-600">
            <svg class="w-6 h-6" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m12 3-1.912 5.813a2 2 0 0 1-1.275 1.275L3 12l5.813 1.912a2 2 0 0 1 1.275 1.275L12 21l1.912-5.813a2 2 0 0 1 1.275-1.275L21 12l-5.813-1.912a2 2 0 0 1-1.275-1.275L12 3Z"/><path d="M5 3v4"/><path d="M19 17v4"/><path d="M3 5h4"/><path d="M17 19h4"/></svg>
            <h1 class="text-xl font-bold tracking-wide">AI 魔術橡皮擦 Pro</h1>
        </div>
        <div class="text-sm font-medium text-slate-400 tracking-widest hidden sm:block">
            無痕畫質保留技術
        </div>
    </header>

    <main class="flex-1 max-w-[1600px] w-full mx-auto p-4 lg:p-8 flex flex-col lg:flex-row gap-6">
        
        <aside class="w-full lg:w-[340px] flex-shrink-0 flex flex-col gap-6">
            <div class="bg-white border border-slate-200 rounded-2xl p-5 shadow-sm">
                <h2 class="text-lg font-bold text-slate-800 mb-4">處理模式</h2>
                
                <div class="flex bg-slate-100 p-1 rounded-xl mb-6">
                    <button id="btnAutoMode" class="flex-1 py-2.5 px-2 text-sm font-semibold rounded-lg flex justify-center items-center gap-2 transition-all bg-white text-indigo-600 shadow-sm">
                        <svg class="w-4 h-4" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m12 3-1.912 5.813a2 2 0 0 1-1.275 1.275L3 12l5.813 1.912a2 2 0 0 1 1.275 1.275L12 21l1.912-5.813a2 2 0 0 1 1.275-1.275L21 12l-5.813-1.912a2 2 0 0 1-1.275-1.275L12 3Z"/></svg>
                        AI 自動偵測
                    </button>
                    <button id="btnManualMode" class="flex-1 py-2.5 px-2 text-sm font-semibold rounded-lg flex justify-center items-center gap-2 transition-all text-slate-500 hover:text-slate-700">
                        <svg class="w-4 h-4" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 20.94V12.06L7.06 7.12a2 2 0 0 1 0-2.83l1.83-1.83a2 2 0 0 1 2.83 0l4.94 4.94"/><path d="M16 16l-4-4"/><path d="m20 9-6-6"/><path d="M16 21.06V12.18l4.94-4.94a2 2 0 0 1 2.83 0l1.83 1.83a2 2 0 0 1 0 2.83Z"/><path d="M4 14l6 6"/></svg>
                        手動塗抹圈選
                    </button>
                </div>

                <div id="manualControls" class="hidden mb-6 px-1 flex-col gap-3 fade-slide-in">
                    <div class="flex justify-between items-center text-sm font-medium text-slate-600">
                        <span>畫筆粗細</span>
                        <span id="brushSizeDisplay" class="text-indigo-600">50px</span>
                    </div>
                    <input type="range" id="brushSizeInput" min="10" max="100" value="50" class="w-full accent-indigo-600" />
                    <div class="flex justify-between mt-1">
                        <div class="flex gap-2">
                            <button id="btnUndo" disabled class="text-xs text-slate-600 hover:text-indigo-600 font-medium px-2 py-1 bg-slate-100 hover:bg-indigo-50 rounded transition-colors disabled:opacity-50 flex items-center gap-1">
                                <svg class="w-3 h-3" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 14 4 9l5-5"/><path d="M4 9h10.5a5.5 5.5 0 0 1 5.5 5.5v0a5.5 5.5 0 0 1-5.5 5.5H11"/></svg>
                                復原上一筆
                            </button>
                            <button id="btnClearMasks" disabled class="text-xs text-red-500 hover:text-red-700 font-medium px-2 py-1 bg-red-50 hover:bg-red-100 rounded transition-colors disabled:opacity-50">
                                清除全部
                            </button>
                        </div>
                    </div>
                </div>

                <div class="mb-6 flex flex-col gap-2">
                    <label class="text-sm font-semibold text-slate-600">底層 AI 指令 (供進階微調)</label>
                    <textarea id="promptText" class="w-full h-40 p-3 text-sm border border-slate-200 rounded-xl bg-slate-50 text-slate-700 focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-transparent resize-none leading-relaxed"></textarea>
                </div>

                <button id="btnProcess" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white py-3.5 px-4 rounded-xl font-bold flex justify-center items-center gap-2 transition-all shadow-md shadow-indigo-200 disabled:opacity-70 disabled:cursor-not-allowed">
                    <span id="processBtnIcon">
                        <svg class="w-5 h-5" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m12 3-1.912 5.813a2 2 0 0 1-1.275 1.275L3 12l5.813 1.912a2 2 0 0 1 1.275 1.275L12 21l1.912-5.813a2 2 0 0 1 1.275-1.275L21 12l-5.813-1.912a2 2 0 0 1-1.275-1.275L12 3Z"/></svg>
                    </span>
                    <span id="processBtnText">開始無痕移除</span>
                </button>

                <button id="btnUpload" class="w-full mt-3 bg-white border-2 border-slate-200 hover:border-slate-300 hover:bg-slate-50 text-slate-700 py-3 px-4 rounded-xl font-bold flex justify-center items-center transition-all disabled:opacity-50">
                    上傳新照片
                </button>
            </div>
        </aside>

        <section class="flex-1 flex flex-col min-w-0">
            <div class="flex justify-between items-center mb-3 px-2">
                <h3 class="text-base font-bold text-slate-700 flex items-center gap-2">
                    <span id="viewStateText">原始照片</span>
                    <span id="loadingIndicator" class="hidden text-xs text-indigo-500 font-normal animate-pulse">正在運算中...</span>
                </h3>
                
                <div id="topToolbar" class="hidden flex gap-2">
                    <button id="btnReset" class="hidden p-2 text-slate-500 hover:text-slate-800 hover:bg-slate-100 rounded-lg transition-colors flex items-center gap-1 text-sm font-medium" title="還原原圖">
                        <svg class="w-4 h-4" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/></svg>
                        還原
                    </button>
                    <button id="btnDownload" class="p-2 text-indigo-600 hover:text-indigo-800 hover:bg-indigo-50 rounded-lg transition-colors flex items-center gap-1 text-sm font-medium" title="存入相簿 / 下載">
                        <svg class="w-4 h-4" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" x2="12" y1="15" y2="3"/></svg>
                        存入相簿 / 下載
                    </button>
                </div>
            </div>

            <div id="canvasContainer" class="flex-1 bg-slate-100 border border-slate-200 rounded-2xl flex items-center justify-center p-4 relative overflow-hidden transition-all min-h-[500px]">
                
                <div id="uploadPlaceholder" class="flex flex-col items-center justify-center text-slate-400 cursor-pointer hover:text-indigo-500 transition-colors p-12 border-2 border-dashed border-slate-300 hover:border-indigo-400 rounded-2xl w-full h-full max-w-md max-h-64">
                    <svg class="w-16 h-16 mb-4 opacity-80" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="18" height="18" x="3" y="3" rx="2" ry="2"/><circle cx="9" cy="9" r="2"/><path d="m21 15-3.086-3.086a2 2 0 0 0-2.828 0L6 21"/></svg>
                    <p class="font-semibold text-lg mb-1">點擊或拖曳上傳圖片</p>
                    <p class="text-sm opacity-80">支援 JPG, PNG 格式</p>
                </div>

                <div id="canvasWrapper" class="hidden relative w-full h-full flex items-center justify-center">
                    <canvas id="mainCanvas" class="max-w-full max-h-full object-contain shadow-sm rounded-md" style="touch-action: none;"></canvas>
                    <canvas id="maskCanvas" class="absolute max-w-full max-h-full object-contain top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 pointer-events-none" style="touch-action: none;"></canvas>
                </div>

                <div id="manualHint" class="hidden absolute bottom-8 bg-indigo-600/90 text-white px-4 py-2 rounded-full text-sm font-medium shadow-lg pointer-events-none animate-bounce">
                    請直接在相片上塗抹欲移除的路人
                </div>

                <div id="mobileSaveHint" class="hidden absolute top-4 bg-slate-800/80 backdrop-blur text-white px-4 py-1.5 rounded-full text-xs font-medium shadow-lg pointer-events-none sm:hidden">
                    💡 提示：按鈕若無效，可直接長按圖片「儲存影像」
                </div>
            </div>
        </section>
    </main>

    <script>
        // --- 狀態管理 ---
        const State = {
            image: null,
            originalImage: null,
            isDrawing: false,
            brushSize: 50,
            maskPaths: [],
            currentPath: null,
            status: 'idle', // 'idle', 'loading', 'success', 'error'
            mode: 'auto', // 'auto' or 'manual'
            promptText: '',
            viewState: '原始照片' // '原始照片' or '處理結果'
        };

        // --- 預設 AI 提示詞 ---
        const defaultAutoPrompt = "自動偵測並移除照片背景中的所有路人和雜物。\n**最高指導原則：絕對不可觸碰或改變最前方主要人物的任何部分，包含臉部、頭髮、衣物等所有細節。** 請以像素級的精確度完美保留主角的原貌，確保其畫質、清晰度與解析度完全維持原狀。";
        const defaultManualPrompt = "這是一張帶有半透明紅色畫筆塗抹痕跡的照片。請執行「影像修補 (Inpainting)」。\n目標：完美消除被「紅色畫筆」覆蓋的人物或雜物。\n請根據該人物後方的背景（如海浪、沙灘、天空、建築等）紋理與光影，進行極度自然且無痕的填補。填補的區域必須與周遭環境完美融合。";

        // --- DOM 元素綁定 ---
        const DOM = {
            fileInput: document.getElementById('fileInput'),
            btnUpload: document.getElementById('btnUpload'),
            btnAutoMode: document.getElementById('btnAutoMode'),
            btnManualMode: document.getElementById('btnManualMode'),
            manualControls: document.getElementById('manualControls'),
            brushSizeInput: document.getElementById('brushSizeInput'),
            brushSizeDisplay: document.getElementById('brushSizeDisplay'),
            btnUndo: document.getElementById('btnUndo'),
            btnClearMasks: document.getElementById('btnClearMasks'),
            promptText: document.getElementById('promptText'),
            btnProcess: document.getElementById('btnProcess'),
            processBtnIcon: document.getElementById('processBtnIcon'),
            processBtnText: document.getElementById('processBtnText'),
            viewStateText: document.getElementById('viewStateText'),
            loadingIndicator: document.getElementById('loadingIndicator'),
            topToolbar: document.getElementById('topToolbar'),
            btnReset: document.getElementById('btnReset'),
            btnDownload: document.getElementById('btnDownload'),
            uploadPlaceholder: document.getElementById('uploadPlaceholder'),
            canvasWrapper: document.getElementById('canvasWrapper'),
            mainCanvas: document.getElementById('mainCanvas'),
            maskCanvas: document.getElementById('maskCanvas'),
            canvasContainer: document.getElementById('canvasContainer'),
            manualHint: document.getElementById('manualHint'),
            mobileSaveHint: document.getElementById('mobileSaveHint')
        };

        // --- 初始化 ---
        function init() {
            setMode('auto');
            bindEvents();
        }

        // --- 事件綁定 ---
        function bindEvents() {
            DOM.btnUpload.addEventListener('click', () => DOM.fileInput.click());
            DOM.uploadPlaceholder.addEventListener('click', () => DOM.fileInput.click());
            DOM.fileInput.addEventListener('change', handleImageUpload);
            
            DOM.btnAutoMode.addEventListener('click', () => setMode('auto'));
            DOM.btnManualMode.addEventListener('click', () => setMode('manual'));
            
            DOM.brushSizeInput.addEventListener('input', (e) => {
                State.brushSize = parseInt(e.target.value);
                DOM.brushSizeDisplay.textContent = `${State.brushSize}px`;
            });

            DOM.promptText.addEventListener('input', (e) => State.promptText = e.target.value);
            
            DOM.btnUndo.addEventListener('click', undoLastMask);
            DOM.btnClearMasks.addEventListener('click', clearAllMasks);
            DOM.btnReset.addEventListener('click', resetImage);
            DOM.btnDownload.addEventListener('click', downloadImage);
            DOM.btnProcess.addEventListener('click', processImage);

            // 畫布繪圖事件
            DOM.maskCanvas.addEventListener('mousedown', startDrawing);
            DOM.maskCanvas.addEventListener('mousemove', draw);
            window.addEventListener('mouseup', stopDrawing);
            
            // 觸控支援
            DOM.maskCanvas.addEventListener('touchstart', startDrawing, { passive: false });
            DOM.maskCanvas.addEventListener('touchmove', draw, { passive: false });
            window.addEventListener('touchend', stopDrawing);
        }

        // --- 核心邏輯與畫面更新 ---
        function setMode(newMode) {
            State.mode = newMode;
            State.promptText = newMode === 'auto' ? defaultAutoPrompt : defaultManualPrompt;
            DOM.promptText.value = State.promptText;
            
            // 更新按鈕樣式
            if (newMode === 'auto') {
                DOM.btnAutoMode.className = "flex-1 py-2.5 px-2 text-sm font-semibold rounded-lg flex justify-center items-center gap-2 transition-all bg-white text-indigo-600 shadow-sm";
                DOM.btnManualMode.className = "flex-1 py-2.5 px-2 text-sm font-semibold rounded-lg flex justify-center items-center gap-2 transition-all text-slate-500 hover:text-slate-700";
                DOM.manualControls.classList.add('hidden');
                DOM.maskCanvas.classList.add('pointer-events-none');
                DOM.canvasContainer.classList.remove('cursor-crosshair');
            } else {
                DOM.btnManualMode.className = "flex-1 py-2.5 px-2 text-sm font-semibold rounded-lg flex justify-center items-center gap-2 transition-all bg-white text-indigo-600 shadow-sm";
                DOM.btnAutoMode.className = "flex-1 py-2.5 px-2 text-sm font-semibold rounded-lg flex justify-center items-center gap-2 transition-all text-slate-500 hover:text-slate-700";
                if(State.image) DOM.manualControls.classList.remove('hidden');
                DOM.maskCanvas.classList.remove('pointer-events-none');
                if(State.image) DOM.canvasContainer.classList.add('cursor-crosshair');
            }
            updateDynamicUI();
        }

        function handleImageUpload(e) {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = (event) => {
                    State.image = event.target.result;
                    State.originalImage = event.target.result;
                    State.maskPaths = [];
                    State.status = 'idle';
                    State.viewState = '原始照片';
                    
                    DOM.uploadPlaceholder.classList.add('hidden');
                    DOM.canvasWrapper.classList.remove('hidden');
                    if(State.mode === 'manual') {
                        DOM.manualControls.classList.remove('hidden');
                        DOM.canvasContainer.classList.add('cursor-crosshair');
                    }
                    
                    renderImageToCanvas();
                    updateDynamicUI();
                };
                reader.readAsDataURL(file);
            }
        }

        function renderImageToCanvas() {
            const ctx = DOM.mainCanvas.getContext('2d');
            const img = new Image();
            img.onload = () => {
                DOM.mainCanvas.width = img.width;
                DOM.mainCanvas.height = img.height;
                DOM.maskCanvas.width = img.width;
                DOM.maskCanvas.height = img.height;
                ctx.clearRect(0, 0, DOM.mainCanvas.width, DOM.mainCanvas.height);
                ctx.drawImage(img, 0, 0);
                redrawMask();
            };
            img.src = State.image;
        }

        function updateDynamicUI() {
            DOM.viewStateText.textContent = State.viewState;
            
            // 右上角工具列與提示
            if (State.image) {
                DOM.topToolbar.classList.remove('hidden');
                if (State.viewState === '處理結果' && State.originalImage !== State.image) {
                    DOM.btnReset.classList.remove('hidden');
                    DOM.mobileSaveHint.classList.remove('hidden');
                } else {
                    DOM.btnReset.classList.add('hidden');
                    DOM.mobileSaveHint.classList.add('hidden');
                }
            } else {
                DOM.topToolbar.classList.add('hidden');
            }

            // 復原/清除按鈕狀態
            const hasMasks = State.maskPaths.length > 0;
            DOM.btnUndo.disabled = !hasMasks;
            DOM.btnClearMasks.disabled = !hasMasks;

            // 畫筆提示
            if (State.image && State.mode === 'manual' && !hasMasks && State.status === 'idle') {
                DOM.manualHint.classList.remove('hidden');
            } else {
                DOM.manualHint.classList.add('hidden');
            }

            // 處理中狀態
            if (State.status === 'loading') {
                DOM.loadingIndicator.classList.remove('hidden');
                DOM.btnProcess.disabled = true;
                DOM.btnUpload.disabled = true;
                DOM.processBtnText.textContent = '處理中...';
                DOM.processBtnIcon.innerHTML = `<svg class="w-5 h-5 animate-spin" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12a9 9 0 1 1-6.219-8.56"/></svg>`;
            } else {
                DOM.loadingIndicator.classList.add('hidden');
                DOM.btnProcess.disabled = false;
                DOM.btnUpload.disabled = false;
                DOM.processBtnText.textContent = '開始無痕移除';
                DOM.processBtnIcon.innerHTML = `<svg class="w-5 h-5" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m12 3-1.912 5.813a2 2 0 0 1-1.275 1.275L3 12l5.813 1.912a2 2 0 0 1 1.275 1.275L12 21l1.912-5.813a2 2 0 0 1 1.275-1.275L21 12l-5.813-1.912a2 2 0 0 1-1.275-1.275L12 3Z"/></svg>`;
            }
        }

        // --- 繪圖功能 ---
        function getCoordinates(e) {
            const rect = DOM.maskCanvas.getBoundingClientRect();
            const scaleX = DOM.maskCanvas.width / rect.width;
            const scaleY = DOM.maskCanvas.height / rect.height;
            
            let clientX, clientY;
            if (e.touches && e.touches.length > 0) {
                clientX = e.touches[0].clientX;
                clientY = e.touches[0].clientY;
            } else {
                clientX = e.clientX;
                clientY = e.clientY;
            }

            return {
                x: (clientX - rect.left) * scaleX,
                y: (clientY - rect.top) * scaleY
            };
        }

        function startDrawing(e) {
            if (State.mode !== 'manual' || State.status === 'loading' || !State.image) return;
            if (e.cancelable) e.preventDefault(); // 防止手機滾動
            const coords = getCoordinates(e);
            State.isDrawing = true;
            State.currentPath = { size: State.brushSize, points: [coords] };
            DOM.manualHint.classList.add('hidden');
        }

        function draw(e) {
            if (!State.isDrawing || State.mode !== 'manual' || State.status === 'loading') return;
            if (e.cancelable) e.preventDefault();
            const coords = getCoordinates(e);
            State.currentPath.points.push(coords);
            redrawMask();
        }

        function stopDrawing() {
            if (!State.isDrawing) return;
            State.isDrawing = false;
            if (State.currentPath && State.currentPath.points.length > 0) {
                State.maskPaths.push(State.currentPath);
            }
            State.currentPath = null;
            redrawMask();
            updateDynamicUI();
        }

        function undoLastMask() {
            State.maskPaths.pop();
            State.currentPath = null;
            redrawMask();
            updateDynamicUI();
        }

        function clearAllMasks() {
            State.maskPaths = [];
            State.currentPath = null;
            redrawMask();
            updateDynamicUI();
        }

        function redrawMask() {
            const ctx = DOM.maskCanvas.getContext('2d');
            ctx.clearRect(0, 0, DOM.maskCanvas.width, DOM.maskCanvas.height);
            
            ctx.lineCap = 'round';
            ctx.lineJoin = 'round';
            ctx.strokeStyle = 'rgba(255, 50, 50, 0.5)'; // 半透明紅色

            const allPaths = State.currentPath ? [...State.maskPaths, State.currentPath] : State.maskPaths;

            allPaths.forEach(path => {
                if (path.points.length === 0) return;
                ctx.lineWidth = path.size;
                ctx.beginPath();
                ctx.moveTo(path.points[0].x, path.points[0].y);
                for (let i = 1; i < path.points.length; i++) {
                    ctx.lineTo(path.points[i].x, path.points[i].y);
                }
                ctx.stroke();
            });
        }

        function resetImage() {
            State.image = State.originalImage;
            State.maskPaths = [];
            State.status = 'idle';
            State.viewState = '原始照片';
            renderImageToCanvas();
            updateDynamicUI();
        }

        // --- 影像合成與 AI 處理 ---
        function getCompositedBase64() {
            const canvas = document.createElement('canvas');
            canvas.width = DOM.mainCanvas.width;
            canvas.height = DOM.mainCanvas.height;
            const ctx = canvas.getContext('2d');
            
            ctx.drawImage(DOM.mainCanvas, 0, 0);
            ctx.drawImage(DOM.maskCanvas, 0, 0);
            
            return canvas.toDataURL('image/jpeg', 0.95);
        }

        // 保證非圈選區域 100% 使用原圖像素的合成函數
        function applyMaskComposite(aiImageBase64, originalImageSrc, paths, canvasWidth, canvasHeight) {
            return new Promise((resolve) => {
                const imgOriginal = new Image();
                imgOriginal.onload = () => {
                    const imgAI = new Image();
                    imgAI.onload = () => {
                        const canvas = document.createElement('canvas');
                        canvas.width = canvasWidth;
                        canvas.height = canvasHeight;
                        const ctx = canvas.getContext('2d');

                        // 1. 底層：100% 保留原始圖片像素
                        ctx.drawImage(imgOriginal, 0, 0, canvas.width, canvas.height);

                        // 2. 製作 AI 專屬遮罩層
                        const aiCanvas = document.createElement('canvas');
                        aiCanvas.width = canvas.width;
                        aiCanvas.height = canvas.height;
                        const aiCtx = aiCanvas.getContext('2d');
                        aiCtx.drawImage(imgAI, 0, 0, canvas.width, canvas.height);

                        // 製作實心路徑遮罩
                        const maskCanvas = document.createElement('canvas');
                        maskCanvas.width = canvas.width;
                        maskCanvas.height = canvas.height;
                        const maskCtx = maskCanvas.getContext('2d');
                        
                        maskCtx.lineCap = 'round';
                        maskCtx.lineJoin = 'round';
                        maskCtx.strokeStyle = 'black';
                        maskCtx.filter = 'blur(6px)'; // 邊緣羽化，拼接更自然

                        paths.forEach(path => {
                            if (path.points.length === 0) return;
                            maskCtx.lineWidth = path.size + 6; // 稍微外擴
                            maskCtx.beginPath();
                            maskCtx.moveTo(path.points[0].x, path.points[0].y);
                            for (let i = 1; i < path.points.length; i++) {
                                maskCtx.lineTo(path.points[i].x, path.points[i].y);
                            }
                            maskCtx.stroke();
                        });

                        // 裁切 AI 補丁
                        aiCtx.globalCompositeOperation = 'destination-in';
                        aiCtx.drawImage(maskCanvas, 0, 0);

                        // 3. 無縫貼回原圖
                        ctx.drawImage(aiCanvas, 0, 0);
                        resolve(canvas.toDataURL('image/jpeg', 1.0));
                    };
                    imgAI.src = `data:image/jpeg;base64,${aiImageBase64}`;
                };
                imgOriginal.src = originalImageSrc;
            });
        }

        async function processImage() {
            if (!State.image) {
                DOM.fileInput.click();
                return;
            }
            
            if (State.mode === 'manual' && State.maskPaths.length === 0) {
                alert('請先使用畫筆在畫面上圈選要移除的路人或物件。');
                return;
            }

            State.status = 'loading';
            updateDynamicUI();

            const apiKey = "AIzaSyCRJgz-pAZPOvl1lRs-lz9UoSSY3JjENbk";
            const apiUrl = `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${apiKey}`;
            
            let base64Data = State.mode === 'auto' ? State.image.split(',')[1] : getCompositedBase64().split(',')[1];

            const payload = {
                contents: [{
                    parts: [
                        { text: State.promptText },
                        { inlineData: { mimeType: "image/jpeg", data: base64Data } }
                    ]
                }],
                generationConfig: {
                    responseModalities: ["TEXT", "IMAGE"]
                }
            };

            const delays = [1000, 2000, 4000, 8000, 16000];
            
            for (let i = 0; i < 6; i++) {
                try {
                    const response = await fetch(apiUrl, {
                        method: "POST",
                        headers: { "Content-Type": "application/json" },
                        body: JSON.stringify(payload)
                    });

                    if (!response.ok) throw new Error(`API Error ${response.status}`);
                    
                    const data = await response.json();
                    const base64Result = data.candidates?.[0]?.content?.parts?.find(p => p.inlineData)?.inlineData?.data;

                    if (!base64Result) throw new Error("無效的回傳圖片");

                    let finalImageToSet;
                    if (State.mode === 'manual') {
                        // 強制前端遮罩合成，完美保留未塗抹處畫質與人臉
                        finalImageToSet = await applyMaskComposite(
                            base64Result, 
                            State.image, 
                            State.maskPaths, 
                            DOM.mainCanvas.width, 
                            DOM.mainCanvas.height
                        );
                    } else {
                        finalImageToSet = `data:image/jpeg;base64,${base64Result}`;
                    }

                    State.image = finalImageToSet;
                    State.maskPaths = [];
                    State.status = 'success';
                    State.viewState = '處理結果';
                    
                    renderImageToCanvas();
                    updateDynamicUI();
                    return; 
                } catch (error) {
                    console.error("嘗試失敗:", error);
                    if (i < 5) await new Promise(res => setTimeout(res, delays[i]));
                }
            }
            State.status = 'error';
            updateDynamicUI();
            alert('處理失敗，請稍後重試或檢查網路連線。');
        }

        async function downloadImage() {
            try {
                const base64Data = State.image.split(',')[1];
                const byteCharacters = atob(base64Data);
                const byteArrays = [];
                for (let offset = 0; offset < byteCharacters.length; offset += 512) {
                    const slice = byteCharacters.slice(offset, offset + 512);
                    const byteNumbers = new Array(slice.length);
                    for (let i = 0; i < slice.length; i++) {
                        byteNumbers[i] = slice.charCodeAt(i);
                    }
                    byteArrays.push(new Uint8Array(byteNumbers));
                }
                const blob = new Blob(byteArrays, { type: 'image/jpeg' });
                const file = new File([blob], `magic-eraser-${Date.now()}.jpg`, { type: 'image/jpeg' });

                if (navigator.canShare && navigator.canShare({ files: [file] })) {
                    try {
                        await navigator.share({ files: [file], title: 'AI 魔術橡皮擦處理結果' });
                        return;
                    } catch (e) {
                        if (e.name === 'AbortError') return;
                    }
                }

                const blobUrl = URL.createObjectURL(blob);
                const link = document.createElement('a');
                link.href = blobUrl;
                link.download = `magic-eraser-${Date.now()}.jpg`;
                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);
                setTimeout(() => URL.revokeObjectURL(blobUrl), 1000);
            } catch (error) {
                alert('自動下載失敗，請直接「長按圖片」並選擇「儲存影像」來保存到相簿。');
            }
        }

        // 啟動應用程式
        init();

    </script>
